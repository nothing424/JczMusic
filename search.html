<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Search — Jcz Music</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/base.css"/>
  <link rel="stylesheet" href="css/layout.css"/>
  <link rel="stylesheet" href="css/player.css"/>
  <link rel="stylesheet" href="css/search.css"/>
</head>
<body>

  <div class="ambient-bg">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="grain"></div>
  </div>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <span class="logo-mark">♩</span>
      <div class="logo-text">
        <span class="logo-name">Jcz</span>
        <span class="logo-sub">MUSIC</span>
      </div>
    </div>
    <nav class="sidebar-nav">
      <a href="index.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>
        <span>Home</span>
      </a>
      <a href="search.html" class="nav-item active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/></svg>
        <span>Search</span>
      </a>
      <a href="playlist.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
        <span>Playlist</span>
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="now-playing-mini" id="nowPlayingMini">
        <div class="mini-art" id="miniArt"></div>
        <div class="mini-info">
          <span class="mini-title" id="miniTitle">—</span>
          <span class="mini-artist" id="miniArtist">Pilih lagu</span>
        </div>
      </div>
    </div>
  </aside>

  <main class="main-content" id="mainContent">
    <header class="topbar">
      <div class="topbar-greeting">
        <h1 class="greeting-text">Search</h1>
        <p class="greeting-sub">Temukan lagu favoritmu</p>
      </div>
      <button class="menu-toggle" id="menuToggle">
        <span></span><span></span><span></span>
      </button>
    </header>

    <!-- Search Input -->
    <section class="search-hero">
      <div class="search-box-wrap">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/></svg>
        <input type="text" class="search-input" id="searchInput" placeholder="Cari judul, artis, genre…" oninput="handleSearch(this.value)" autocomplete="off"/>
        <button class="search-clear" id="searchClear" onclick="clearSearch()" style="display:none">✕</button>
      </div>
    </section>

    <!-- Browse by Genre -->
    <section class="section" id="browseSection">
      <div class="section-header">
        <h2 class="section-title">Browse Genre</h2>
      </div>
      <div class="genre-grid" id="genreGrid"></div>
    </section>

    <!-- Search Results -->
    <section class="section" id="resultsSection" style="display:none">
      <div class="section-header">
        <h2 class="section-title">Hasil Pencarian</h2>
        <span class="section-count" id="resultsCount"></span>
      </div>
      <div class="track-list" id="searchResults"></div>
    </section>

    <!-- No Results -->
    <div class="no-results" id="noResults" style="display:none">
      <div class="no-results-icon">♪</div>
      <p class="no-results-text">Tidak ditemukan</p>
      <p class="no-results-sub">Coba kata kunci lain</p>
    </div>

  </main>

  <!-- Player Bar -->
  <div class="player-bar" id="playerBar">
    <div class="player-track">
      <div class="player-art" id="playerArt">
        <div class="art-placeholder">♪</div>
      </div>
      <div class="player-track-info">
        <span class="player-title" id="playerTitle">Tidak ada lagu</span>
        <span class="player-artist" id="playerArtist">—</span>
      </div>
      <button class="btn-heart" id="btnHeart" onclick="toggleHeart()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
      </button>
    </div>
    <div class="player-controls">
      <button class="ctrl-btn" onclick="shuffleToggle()" id="btnShuffle">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>
      </button>
      <button class="ctrl-btn" onclick="prevTrack()">
        <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="19,20 9,12 19,4"/><line x1="5" y1="19" x2="5" y2="5" stroke="currentColor" stroke-width="2"/></svg>
      </button>
      <button class="ctrl-btn play-pause" id="btnPlayPause" onclick="togglePlay()">
        <svg class="icon-play" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
        <svg class="icon-pause" viewBox="0 0 24 24" fill="currentColor" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
      </button>
      <button class="ctrl-btn" onclick="nextTrack()">
        <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5,4 15,12 5,20"/><line x1="19" y1="5" x2="19" y2="19" stroke="currentColor" stroke-width="2"/></svg>
      </button>
      <button class="ctrl-btn" onclick="repeatToggle()" id="btnRepeat">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 014-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 01-4 4H3"/></svg>
      </button>
    </div>
    <div class="player-progress-wrap">
      <div class="player-progress">
        <span class="time-current" id="timeCurrent">0:00</span>
        <div class="progress-bar" id="progressBar" onclick="seekTo(event)">
          <div class="progress-fill" id="progressFill"></div>
          <div class="progress-thumb" id="progressThumb"></div>
        </div>
        <span class="time-total" id="timeTotal">0:00</span>
      </div>
    </div>
    <div class="player-volume">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 010 14.14"/><path d="M15.54 8.46a5 5 0 010 7.07"/></svg>
      <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="80" oninput="setVolume(this.value)"/>
    </div>
  </div>

  <audio id="audioPlayer"></audio>
  <script src="js/data.js"></script>
  <script src="js/player.js"></script>
  <script src="js/search.js"></script>
</body>
</html>
